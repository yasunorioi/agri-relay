; ccm_rp2350_relay — PlatformIO configuration
; Board: Waveshare RP2350-ETH-8DI-8RO / RP2350-POE-ETH-8DI-8RO
; Framework: arduino-pico (Earle Philhower)

[env:rp2350b]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = generic_rp2350
framework = arduino
board_build.core = earlephilhower

; RP2350B variant (GPIO33-36 requires >30 GPIO support)
board_build.variant = generic_rp2350
board_build.chip = rp2350b

; Flash: 16MB total, 14MB sketch + 2MB LittleFS (OTA requires FS)
board_build.filesystem_size = 2m
board_upload.maximum_size = 14671872

; CPU
board_build.f_cpu = 150000000L

; USB
build_flags =
    -DUSE_TINYUSB=0
    -DPICO_STACK_SIZE=8192

; Libraries
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    arduino-libraries/NTPClient@^3.2.1
    sensirion/Sensirion I2C SHT4x@^1.1.0
    sensirion/Sensirion I2C SCD4x@^0.4.0
    adafruit/Adafruit NeoPixel@^1.15.0
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^4.0.0

; Upload: USB (UF2) for first flash, then OTA via WebUI
upload_protocol = picotool

; Monitor
monitor_speed = 115200
